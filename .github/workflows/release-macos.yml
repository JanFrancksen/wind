name: Release macOS app

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish macOS app
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set release tag
        id: release
        run: |
          version=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          echo "tag=v${version}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build production bundle
        run: |
          cargo build --release --bins --locked
          cargo run --release --bin bundle_wind --locked

      - name: Archive application
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            target/release/bundle/wind.app \
            wind-macos-${{ steps.release.outputs.tag }}.zip

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          asset="wind-macos-${tag}.zip"

          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" \
              --target "${{ github.sha }}" \
              --title "Wind $tag" \
              --generate-notes
          fi
